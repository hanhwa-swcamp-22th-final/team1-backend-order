spring:
  application:
    name: team1-backend-order

  datasource:
    # Docker: SPRING_DATASOURCE_URL 환경변수로 주입 (order-db:3306)
    # 로컬 직접 실행: 기본값 localhost:3308 사용
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3308/order_db?useSSL=false&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:temp_password}
    driver-class-name: org.mariadb.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    serialization:
      write-dates-as-timestamps: false

  kafka:
    # Docker: SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    # 로컬 직접 실행: localhost:9094 (Kafka 외부 리스너)
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

mybatis:
  mapper-locations: classpath:mappers/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.conk.order

order:
  bulk-upload:
    max-row-limit: 5000
    flush-interval: 500
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

