spring:
  application:
    name: team1-backend-order

  jackson:
    serialization:
      write-dates-as-timestamps: false

  kafka:
    # Docker: SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    # 로컬 직접 실행: localhost:9094 (Kafka 외부 리스너)
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

mybatis:
  mapper-locations: classpath:mappers/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.conk.order

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

